name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get
        working-directory: ai-kids-academy

      - name: Build APK
        run: flutter build apk --debug --target-platform android-arm64
        working-directory: ai-kids-academy

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ai-kids-academy-debug-apk
          path: ai-kids-academy/build/app/outputs/flutter-apk/app-debug.apk
