name: ai_kids_academy
description: AI Kids Academy — educational app for children aged 5–7

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  provider: ^6.1.1
  shared_preferences: ^2.2.2
  google_fonts: ^6.1.0
  audioplayers: ^5.2.1
  flutter_tts: ^4.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/data/lessons_ru.json
    - assets/data/lessons_he.json
    - assets/data/lessons_en.json
